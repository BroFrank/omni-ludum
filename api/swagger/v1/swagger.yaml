          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
    post:
      summary: Create game text for a game
      description: Creates a new game text for a specific game
      tags:
        - GameTexts
      parameters:
        - name: game_id
          in: path
          required: true
          description: Unique name of the game
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameTextRequest'
      responses:
        '201':
          description: Game text created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameText'
        '404':
