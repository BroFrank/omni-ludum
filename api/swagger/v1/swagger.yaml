openapi: 3.0.3
info:
  title: Omni Ludum API
  description: API documentation for Omni Ludum application
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/v1/users:
    get:
      summary: Get list of active users
      description: Returns a paginated list of active (non-disabled) users
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      description: Creates a new user with the provided details
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{slug}:
    get:
      summary: Get user by slug
      description: Returns a single active user by their slug
      tags:
        - Users
      parameters:
        - name: slug
          in: path
          required: true
          description: Unique slug identifier for the user
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
    patch:
      summary: Update user
      description: Updates an existing user's details
      tags:
        - Users
      parameters:
        - name: slug
          in: path
          required: true
          description: Unique slug identifier for the user
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{id}/disable:
    patch:
      summary: Disable user (soft delete)
      description: Sets the user's is_disabled flag to true (soft delete)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      responses:
        '200':
          description: User disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{id}/update_theme:
    patch:
      summary: Update user theme
      description: Updates the user's theme preference (light or dark)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThemeRequest'
      responses:
        '200':
          description: Theme updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid theme value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

  /api/v1/users/{id}/update_locale:
    patch:
      summary: Update user locale
      description: Updates the user's locale preference (en or ru)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocaleRequest'
      responses:
        '200':
          description: Locale updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid locale value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

  /api/v1/games:
    get:
      summary: Get list of active games
      description: Returns a paginated list of active (non-disabled) games
      tags:
        - Games
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'
    post:
      summary: Create a new game
      description: Creates a new game with the provided details
      tags:
        - Games
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameErrorResponse'

  /api/v1/games/{name}:
    get:
      summary: Get game by name
      description: Returns a single active game by its name
      tags:
        - Games
      parameters:
        - name: name
          in: path
          required: true
          description: Unique name of the game
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
    patch:
      summary: Update game
      description: Updates an existing game's details
      tags:
        - Games
      parameters:
        - name: name
          in: path
          required: true
          description: Unique name of the game
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
      responses:
        '200':
          description: Game updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameErrorResponse'

  /api/v1/games/{id}/disable:
    patch:
      summary: Disable game (soft delete)
      description: Sets the game's is_disabled flag to true (soft delete)
      tags:
        - Games
      parameters:
        - name: id
          in: path
          required: true
          description: Game name identifier
          schema:
            type: string
      responses:
        '200':
          description: Game disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameErrorResponse'

  /api/v1/reviews:
    get:
      summary: Get list of reviews
      description: Returns a paginated list of reviews. Can be filtered by game_id or user_id
      tags:
        - Reviews
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
        - name: game_id
          in: query
          description: Filter by game name
          required: false
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by user slug
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      summary: Create a new review
      description: Creates a new review for a game by a user
      tags:
        - Reviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewErrorResponse'

  /api/v1/reviews/{id}:
    get:
      summary: Get review by ID
      description: Returns a single review by its ID
      tags:
        - Reviews
      parameters:
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewNotFoundError'
    patch:
      summary: Update review
      description: Updates an existing review's rating, difficulty, or comment
      tags:
        - Reviews
      parameters:
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Review updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewErrorResponse'
    delete:
      summary: Delete review (soft delete)
      description: Sets the review's is_disabled flag to true (soft delete)
      tags:
        - Reviews
      parameters:
        - name: id
          in: path
          required: true
          description: Review ID
          schema:
            type: integer
      responses:
        '200':
          description: Review deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Review successfully deleted"
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewNotFoundError'

  /api/v1/games/{game_id}/reviews:
    get:
      summary: Get reviews for a game
      description: Returns a paginated list of reviews for a specific game
      tags:
        - Reviews
      parameters:
        - name: game_id
          in: path
          required: true
          description: Game name identifier
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'

  /api/v1/users/{user_id}/reviews:
    get:
      summary: Get reviews by a user
      description: Returns a paginated list of reviews by a specific user
      tags:
        - Reviews
      parameters:
        - name: user_id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: Unique user ID
        username:
          type: string
          description: User's display name
          example: "John Doe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        role:
          type: string
          enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
          description: User's role in the system
          example: "REGULAR"
        theme:
          type: string
          enum: [light, dark]
          description: User's theme preference
          example: "light"
        locale:
          type: string
          enum: [en, ru]
          description: User's locale preference
          example: "en"
        slug:
          type: string
          description: URL-friendly unique identifier
          example: "john_doe"
        is_disabled:
          type: boolean
          description: Whether the user account is disabled
          example: false
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - username
        - email
        - role
        - theme
        - locale
        - slug
        - is_disabled
        - created_at
        - updated_at

    CreateUserRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            username:
              type: string
              minLength: 3
              pattern: '^[a-zA-Z0-9 ]+$'
              example: "newuser"
            email:
              type: string
              format: email
              example: "newuser@example.com"
            password:
              type: string
              minLength: 7
              description: Must contain uppercase, lowercase, digit, and special character
              example: "SecurePass123!"
            password_confirmation:
              type: string
              description: Must match password
              example: "SecurePass123!"
            role:
              type: string
              enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
              description: User role (defaults to REGULAR if not provided)
              example: "REGULAR"
          required:
            - username
            - email
            - password

    UpdateUserRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            username:
              type: string
              minLength: 3
              pattern: '^[a-zA-Z0-9 ]+$'
              example: "updateduser"
            email:
              type: string
              format: email
              example: "updated@example.com"
            password:
              type: string
              minLength: 7
              description: Must contain uppercase, lowercase, digit, and special character
              example: "NewSecurePass123!"
            password_confirmation:
              type: string
              description: Must match password
              example: "NewSecurePass123!"
            role:
              type: string
              enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
              example: "MODERATOR"
            theme:
              type: string
              enum: [light, dark]
              example: "dark"
            locale:
              type: string
              enum: [en, ru]
              example: "ru"

    UpdateThemeRequest:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark]
          description: Theme preference
          example: "dark"
      required:
        - theme

    UpdateLocaleRequest:
      type: object
      properties:
        locale:
          type: string
          enum: [en, ru]
          description: Locale preference
          example: "ru"
      required:
        - locale

    UserErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          description: List of validation error messages
          example: ["Email has already been taken", "Password is too short (minimum is 7 characters)"]

    GameErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          description: List of validation error messages
          example: ["Name has already been taken", "Release year is out of valid range"]

    UserNotFoundError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "User not found"

    GameNotFoundError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Game not found"

    Game:
      type: object
      properties:
        id:
          type: integer
          description: Unique game ID
        name:
          type: string
          description: Game name
          example: "The Witcher 3: Wild Hunt"
        release_year:
          type: integer
          description: Year of release
          example: 2015
        rating_avg:
          type: number
          format: float
          description: Average user rating (0-10)
          example: 9.5
        difficulty_avg:
          type: number
          format: float
          description: Average difficulty rating (0-10)
          example: 6.0
        playtime_avg:
          type: integer
          description: Average playtime in minutes
          example: 120
        playtime_100_avg:
          type: integer
          description: Average time to 100% completion in minutes
          example: 360
        is_dlc:
          type: boolean
          description: Whether this is a DLC
          example: false
        is_mod:
          type: boolean
          description: Whether this is a mod/room hack
          example: false
        is_disabled:
          type: boolean
          description: Whether the game is disabled (soft delete)
          example: false
        base_game_id:
          type: integer
          description: ID of the original game (for DLCs/mods)
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - is_dlc
        - is_mod
        - is_disabled
        - created_at
        - updated_at

    CreateGameRequest:
      type: object
      properties:
        game:
          type: object
          properties:
            name:
              type: string
              description: Game name
              example: "New Game"
            release_year:
              type: integer
              description: Year of release
              example: 2024
            rating_avg:
              type: number
              format: float
              description: Average user rating (0-10)
              example: 8.0
            difficulty_avg:
              type: number
              format: float
              description: Average difficulty rating (0-10)
              example: 5.0
            playtime_avg:
              type: integer
              description: Average playtime in minutes
              example: 120
            playtime_100_avg:
              type: integer
              description: Average time to 100% completion in minutes
              example: 360
            is_dlc:
              type: boolean
              description: Whether this is a DLC
              example: false
            is_mod:
              type: boolean
              description: Whether this is a mod/room hack
              example: false
            base_game_id:
              type: integer
              description: ID of the original game (for DLCs/mods)
              example: 1
          required:
            - name

    UpdateGameRequest:
      type: object
      properties:
        game:
          type: object
          properties:
            name:
              type: string
              description: Game name
              example: "Updated Game"
            release_year:
              type: integer
              description: Year of release
              example: 2025
            rating_avg:
              type: number
              format: float
              description: Average user rating (0-10)
              example: 9.0
            difficulty_avg:
              type: number
              format: float
              description: Average difficulty rating (0-10)
              example: 6.5
            playtime_avg:
              type: integer
              description: Average playtime in minutes
              example: 150
            playtime_100_avg:
              type: integer
              description: Average time to 100% completion in minutes
              example: 400
            is_dlc:
              type: boolean
              description: Whether this is a DLC
              example: true
            is_mod:
              type: boolean
              description: Whether this is a mod/room hack
              example: false
            base_game_id:
              type: integer
              description: ID of the original game (for DLCs/mods)
              example: 1

    Review:
      type: object
      properties:
        id:
          type: integer
          description: Unique review ID
          example: 1
        user_id:
          type: integer
          description: ID of the user who wrote the review
          example: 1
        game_id:
          type: integer
          description: ID of the game being reviewed
          example: 1
        rating:
          type: integer
          description: User's rating (0-10)
          minimum: 0
          maximum: 10
          example: 8
        difficulty:
          type: integer
          description: User's difficulty rating (0-10)
          minimum: 0
          maximum: 10
          example: 5
        comment:
          type: string
          description: Optional review comment
          example: "Great game!"
        is_disabled:
          type: boolean
          description: Whether the review is disabled (soft delete)
          example: false
        created_at:
          type: string
          format: date-time
          description: Review creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Review update timestamp
      required:
        - id
        - user_id
        - game_id
        - rating
        - difficulty
        - is_disabled
        - created_at
        - updated_at

    CreateReviewRequest:
      type: object
      properties:
        review:
          type: object
          properties:
            user_id:
              type: integer
              description: ID of the user
              example: 1
            game_id:
              type: integer
              description: ID of the game
              example: 1
            rating:
              type: integer
              minimum: 0
              maximum: 10
              description: Rating from 0 to 10
              example: 8
            difficulty:
              type: integer
              minimum: 0
              maximum: 10
              description: Difficulty rating from 0 to 10
              example: 5
            comment:
              type: string
              description: Optional comment (max 10000 characters)
              example: "Great game!"
          required:
            - user_id
            - game_id
            - rating
            - difficulty

    UpdateReviewRequest:
      type: object
      properties:
        review:
          type: object
          properties:
            rating:
              type: integer
              minimum: 0
              maximum: 10
              description: Rating from 0 to 10
              example: 9
            difficulty:
              type: integer
              minimum: 0
              maximum: 10
              description: Difficulty rating from 0 to 10
              example: 6
            comment:
              type: string
              description: Optional comment (max 10000 characters)
              example: "Updated review"

    ReviewErrorResponse:
      type: array
      items:
        type: string
      example: ["Rating must be between 0 and 10", "User has already reviewed this game"]

    ReviewNotFoundError:
      type: object
      properties:
        error:
          type: string
          example: "Review not found"
