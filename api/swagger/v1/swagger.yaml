        '404':
          description: Game text not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTextNotFoundError'
    patch:
      summary: Update game text
      description: Updates an existing game text
      tags:
        - GameTexts
      parameters:
        - name: id
          in: path
          required: true
          description: Unique ID of the game text
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameTextRequest'
      responses:
        '200':
          description: Game text updated successfully
          content:
