openapi: 3.0.3
info:
  title: Omni Ludum API
  description: API documentation for Omni Ludum application
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/v1/users:
    get:
      summary: Get list of active users
      description: Returns a paginated list of active (non-disabled) users
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      description: Creates a new user with the provided details
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{slug}:
    get:
      summary: Get user by slug
      description: Returns a single active user by their slug
      tags:
        - Users
      parameters:
        - name: slug
          in: path
          required: true
          description: Unique slug identifier for the user
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
    patch:
      summary: Update user
      description: Updates an existing user's details
      tags:
        - Users
      parameters:
        - name: slug
          in: path
          required: true
          description: Unique slug identifier for the user
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{id}/disable:
    patch:
      summary: Disable user (soft delete)
      description: Sets the user's is_disabled flag to true (soft delete)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      responses:
        '200':
          description: User disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'

  /api/v1/users/{id}/update_theme:
    patch:
      summary: Update user theme
      description: Updates the user's theme preference (light or dark)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThemeRequest'
      responses:
        '200':
          description: Theme updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid theme value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

  /api/v1/users/{id}/update_locale:
    patch:
      summary: Update user locale
      description: Updates the user's locale preference (en or ru)
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User slug identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocaleRequest'
      responses:
        '200':
          description: Locale updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid locale value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

