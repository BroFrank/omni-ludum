      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
    patch:
      summary: Update game
      description: Updates an existing game's details
      tags:
        - Games
      parameters:
        - name: name
          in: path
          required: true
          description: Unique name of the game
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGameRequest'
      responses:
        '200':
          description: Game updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameErrorResponse'

  /api/v1/games/{id}/disable:
    patch:
      summary: Disable game (soft delete)
      description: Sets the game's is_disabled flag to true (soft delete)
      tags:
        - Games
      parameters:
        - name: id
          in: path
          required: true
          description: Game name identifier
          schema:
            type: string
      responses:
        '200':
          description: Game disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameNotFoundError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameErrorResponse'

  /api/v1/game_texts:
    get:
      summary: Get list of game texts
      description: Returns a paginated list of game texts
      tags:
        - GameTexts
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
