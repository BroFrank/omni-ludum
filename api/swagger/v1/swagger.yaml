components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: Unique user ID
        username:
          type: string
          description: User's display name
          example: "John Doe"
        email:
          type: string
          format: email
          description: User's email address
          example: "john@example.com"
        role:
          type: string
          enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
          description: User's role in the system
          example: "REGULAR"
        theme:
          type: string
          enum: [light, dark]
          description: User's theme preference
          example: "light"
        locale:
          type: string
          enum: [en, ru]
          description: User's locale preference
          example: "en"
        slug:
          type: string
          description: URL-friendly unique identifier
          example: "john_doe"
        is_disabled:
          type: boolean
          description: Whether the user account is disabled
          example: false
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - username
        - email
        - role
        - theme
        - locale
        - slug
        - is_disabled
        - created_at
        - updated_at

    CreateUserRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            username:
              type: string
              minLength: 3
              pattern: '^[a-zA-Z0-9 ]+$'
              example: "newuser"
            email:
              type: string
              format: email
              example: "newuser@example.com"
            password:
              type: string
              minLength: 7
              description: Must contain uppercase, lowercase, digit, and special character
              example: "SecurePass123!"
            password_confirmation:
              type: string
              description: Must match password
              example: "SecurePass123!"
            role:
              type: string
              enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
              description: User role (defaults to REGULAR if not provided)
              example: "REGULAR"
          required:
            - username
            - email
            - password

    UpdateUserRequest:
      type: object
      properties:
        user:
          type: object
          properties:
            username:
              type: string
              minLength: 3
              pattern: '^[a-zA-Z0-9 ]+$'
              example: "updateduser"
            email:
              type: string
              format: email
              example: "updated@example.com"
            password:
              type: string
              minLength: 7
              description: Must contain uppercase, lowercase, digit, and special character
              example: "NewSecurePass123!"
            password_confirmation:
              type: string
              description: Must match password
              example: "NewSecurePass123!"
            role:
              type: string
              enum: [SUPER_ADMIN, ADMIN, MODERATOR, REGULAR]
              example: "MODERATOR"
            theme:
              type: string
              enum: [light, dark]
              example: "dark"
            locale:
              type: string
              enum: [en, ru]
              example: "ru"

    UpdateThemeRequest:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark]
          description: Theme preference
          example: "dark"
      required:
        - theme

    UpdateLocaleRequest:
      type: object
      properties:
        locale:
          type: string
          enum: [en, ru]
          description: Locale preference
          example: "ru"
      required:
        - locale

    UserErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          description: List of validation error messages
          example: ["Email has already been taken", "Password is too short (minimum is 7 characters)"]

    GameErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
          description: List of validation error messages
          example: ["Name has already been taken", "Release year is out of valid range"]

    UserNotFoundError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "User not found"

    GameNotFoundError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Game not found"

    Game:
      type: object
      properties:
        id:
          type: integer
          description: Unique game ID
        name:
          type: string
          description: Game name
          example: "The Witcher 3: Wild Hunt"
        release_year:
          type: integer
          description: Year of release
          example: 2015
        rating_avg:
          type: number
          format: float
          description: Average user rating (0-10)
          example: 9.5
        difficulty_avg:
          type: number
          format: float
          description: Average difficulty rating (0-10)
          example: 6.0
        playtime_avg:
          type: integer
          description: Average playtime in minutes
          example: 120
        playtime_100_avg:
          type: integer
          description: Average time to 100% completion in minutes
          example: 360
        is_dlc:
          type: boolean
          description: Whether this is a DLC
          example: false
        is_mod:
          type: boolean
          description: Whether this is a mod/room hack
          example: false
        is_disabled:
          type: boolean
          description: Whether the game is disabled (soft delete)
          example: false
        base_game_id:
          type: integer
          description: ID of the original game (for DLCs/mods)
          example: 1
        platform_id:
          type: integer
          description: ID of the platform
          example: 1
        platform:
          $ref: '#/components/schemas/Platform'
          description: Platform details
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - is_dlc
        - is_mod
        - is_disabled
        - created_at
        - updated_at

    Platform:
      type: object
      properties:
