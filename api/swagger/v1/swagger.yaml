              schema:
                $ref: '#/components/schemas/GameTextErrorResponse'

  /api/v1/reviews:
    get:
      summary: Get list of reviews
      description: Returns a paginated list of reviews. Can be filtered by game_id or user_id
      tags:
        - Reviews
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
        - name: game_id
          in: query
          description: Filter by game name
          required: false
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by user slug
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      summary: Create a new review
      description: Creates a new review for a game by a user
      tags:
        - Reviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Review created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '422':
