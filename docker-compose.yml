services:
  # PostgreSQL Database Service
  # Uses custom Dockerfile from dockerfiles/ directory
  db:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.postgresql
    container_name: omni_ludum_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: omni_ludum_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Persistent data volume
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omni_ludum_development"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - omni_ludum_network

  # Redis Service for Rate Limiting (Rack::Attack)
  # Uses Yandex Container Registry mirror for Russia
  redis:
    image: cr.yandex/mirror/redis:7-alpine
    container_name: omni_ludum_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni_ludum_network

volumes:
  postgres_data:
    name: omni_ludum_postgres_data
  redis_data:
    name: omni_ludum_redis_data

networks:
  omni_ludum_network:
    name: omni_ludum_network
    driver: bridge
